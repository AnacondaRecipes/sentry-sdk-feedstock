{% set name = "sentry-sdk" %}
{% set version = "2.44.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sentry_sdk-{{ version }}.tar.gz
  sha256: 5b1fe54dfafa332e900b07dd8f4dfe35753b64e78e7d9b1655a28fd3065e2493

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv
  skip: true  # [py<36]

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - urllib3 >=1.26.11
    - certifi
  run_constrained:
    - aiohttp >=3.5
    - anthropic >=0.16
    - arq >=0.23
    - asyncpg >=0.23
    - apache-beam >=2.12
    - bottle >=0.12.13
    - celery >=3
    - chalice >=1.16.0
    - clickhouse-driver >=0.2.0
    - django >=1.8
    - falcon >=1.4
    - fastapi >=0.79.0
    - flask >=0.11
    - blinker >=1.1
    - grpcio >=1.21.1
    - protobuf >=3.8.0
    - httpcore ==1.*
    - httpx >=0.16.0
    - huey >=2
    - huggingface_hub >=0.22
    - langchain >=0.0.210
    - launchdarkly-server-sdk >=9.8.0
    - loguru >=0.5
    - openai >=1.0.0
    - tiktoken >=0.3.0
    - openfeature-sdk >=0.7.1
    - opentelemetry-distro >=0.35b0
    - pymongo >=3.1
    - pyspark >=2.4.4
    - quart >=0.16.1
    - rq >=0.6
    - sanic >=0.8
    - sqlalchemy >=1.2
    - starlette >=0.19.1
    - starlite >=1.48
    - tornado >=6
    - celery-redbeat >=2
    - google-genai >=1.29.0
    - langgraph >=0.6.6
    - litellm >=1.77.5
    - mcp >=1.15.0
    - pydantic-ai >=1.0.0
    - statsig >=0.55.3
    - UnleashClient >=6.0.1

test:
  requires:
    - pip
  imports:
    - sentry_sdk
  commands:
    - pip check

about:
  home: https://github.com/getsentry/sentry-python
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE
  summary: The new Python SDK for Sentry.io
  description: |
    The new Python SDK for Sentry.io
  doc_url: https://docs.sentry.io/quickstart/?platform=python
  dev_url: https://github.com/getsentry/sentry-python

extra:
  recipe-maintainers:
    - alippai
    - dgasmith
    - djsutherland
